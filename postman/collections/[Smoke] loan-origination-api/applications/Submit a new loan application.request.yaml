type: http
name: Submit a new loan application
url: '{{baseUrl}}/applications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "applicantId": "app_9876543210",
      "productType": "personal_loan",
      "requestedAmount": 25000,
      "termMonths": 36,
      "purpose": "debt_consolidation",
      "annualIncome": 85000,
      "employmentStatus": "full_time"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "applicantId": "string",
            "productType": "string",
            "requestedAmount": 4848.377871502305,
            "termMonths": 7354,
            "status": "submitted",
            "createdAt": "1953-06-29T12:34:08.319Z",
            "updatedAt": "1963-04-16T20:04:08.257Z",
            "underwritingResult": {
              "applicationId": "string",
              "status": "completed",
              "decision": "denied",
              "riskScore": 36,
              "evaluatedAt": "1994-05-31T20:14:50.563Z"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application created successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid application data
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Duplicate active application exists
