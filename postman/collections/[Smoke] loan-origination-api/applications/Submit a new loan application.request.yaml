type: http
name: Submit a new loan application
url: '{{baseUrl}}/applications'
method: POST
headers:
  - key: Content-Type
    value: application/json
  - key: Accept
    value: application/json
body:
  type: json
  content: |-
    {
      "applicantId": "app_9876543210",
      "productType": "personal_loan",
      "requestedAmount": 25000,
      "termMonths": 36,
      "purpose": "debt_consolidation",
      "annualIncome": 85000,
      "employmentStatus": "full_time"
    }
scripts:
  - type: afterResponse
    code:
      - // [Smoke] Auto-generated test assertions
      - pm.test('Status code is successful (2xx)', function () {
      - '    pm.response.to.be.success;'
      - '});'
      - pm.test('Response time is acceptable', function () {
      - '    var threshold = parseInt(pm.environment.get(''RESPONSE_TIME_THRESHOLD'') || ''2000'', 10);'
      - '    pm.expect(pm.response.responseTime).to.be.below(threshold);'
      - '});'
      - pm.test('Response body is not empty', function () {
      - '    if (pm.response.code !== 204) {'
      - '        var body = pm.response.text();'
      - '        pm.expect(body.length).to.be.above(0);'
      - '    }'
      - '});'
    language: text/javascript
examples:
  - response:
      statusCode: 201
      statusText: Created
      body:
        type: json
        content: |-
          {
            "id": "string",
            "applicantId": "string",
            "productType": "string",
            "requestedAmount": 7392.600947836765,
            "termMonths": 4059,
            "status": "approved",
            "createdAt": "1965-09-28T02:06:01.731Z",
            "updatedAt": "1971-06-24T10:26:16.176Z",
            "underwritingResult": {
              "applicationId": "string",
              "status": "pending",
              "decision": "referred_to_manual",
              "riskScore": 1,
              "evaluatedAt": "1953-07-07T09:51:46.494Z"
            }
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Application created successfully
  - response:
      statusCode: 400
      statusText: Bad Request
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Invalid application data
  - response:
      statusCode: 409
      statusText: Conflict
      body:
        type: json
        content: |-
          {
            "code": "string",
            "message": "string",
            "details": {}
          }
      headers:
        - key: Content-Type
          value: application/json
    name: Duplicate active application exists
